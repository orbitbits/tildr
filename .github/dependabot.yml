version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "quarterly"
    open-pull-requests-limit: 2
    groups:
      rust-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "build"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "quarterly"
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "dtolnay/rust-toolchain"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
