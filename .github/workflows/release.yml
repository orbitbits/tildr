name: Release Linux/macOS

on:
  push:
    branches:
      - main
    paths-ignore:
      - "CHANGELOG.md"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release commit
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_sha: ${{ steps.release_commit.outputs.release_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: |
          cargo install git-cliff --locked --version 2.13.1
          jq --version

      - name: Install Pandoc
        env:
          PANDOC_VERSION: 3.6.1
        run: |
          curl --fail --location --show-error --silent \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 5 \
            --connect-timeout 30 \
            --max-time 300 \
            "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb" \
            --output "$RUNNER_TEMP/pandoc.deb"
          sudo dpkg --install "$RUNNER_TEMP/pandoc.deb"
          pandoc --version

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name=="tildr") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag_check
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if tag exists
        if: steps.tag_check.outputs.exists == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: echo "Tag ${TAG} already exists. Nothing to release."

      - name: Sync site docs version
        if: steps.tag_check.outputs.exists != 'true'
        run: make docs-version

      - name: Check workspace
        if: steps.tag_check.outputs.exists != 'true'
        run: make check

      - name: Generate man pages
        if: steps.tag_check.outputs.exists != 'true'
        run: make man

      - name: Generate changelog
        if: steps.tag_check.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: git cliff --config cliff.toml --tag "$TAG" --output CHANGELOG.md

      - name: Commit release sources
        if: steps.tag_check.outputs.exists != 'true'
        id: release_commit
        env:
          BRANCH: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add CHANGELOG.md docs/man/dist

          if ! git diff --cached --quiet; then
            git commit -m "chore(release): prepare v${VERSION} [skip ci]"
          else
            echo "No release source changes to commit."
          fi

          git fetch origin "$BRANCH"
          git rebase "origin/$BRANCH"
          git push origin HEAD:"$BRANCH"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build Linux
    needs: prepare
    if: needs.prepare.outputs.release_sha != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test Linux
        run: cargo test --target x86_64-unknown-linux-gnu --locked

      - name: Build Linux
        run: cargo build --release --target x86_64-unknown-linux-gnu --locked

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/tildr \
            "dist/tildr-${{ needs.prepare.outputs.version }}-linux-x86_64"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: dist/*
          if-no-files-found: error

  build-macos:
    name: Build macOS
    needs: prepare
    if: needs.prepare.outputs.release_sha != ''
    runs-on: macos-latest

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0

      - name: Disable osxcross config
        run: |
          if [ -f .cargo/config.toml ]; then
            mv .cargo/config.toml .cargo/config.toml.bak
          fi

      - name: Add macOS targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Test macOS
        run: |
          cargo test --target x86_64-apple-darwin --locked
          cargo test --target aarch64-apple-darwin --locked

      - name: Build macOS
        run: |
          cargo build --release --target x86_64-apple-darwin --locked
          cargo build --release --target aarch64-apple-darwin --locked

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-apple-darwin/release/tildr \
            "dist/tildr-${{ needs.prepare.outputs.version }}-macos-x86_64"
          cp target/aarch64-apple-darwin/release/tildr \
            "dist/tildr-${{ needs.prepare.outputs.version }}-macos-aarch64"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs:
      - prepare
      - build-linux
      - build-macos
    if: needs.prepare.outputs.release_sha != ''
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Install dependencies
        run: cargo install git-cliff --locked --version 2.13.1

      - name: Create and push tag
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Refusing to overwrite it."
            exit 1
          fi

          git tag "$TAG" "$RELEASE_SHA"
          git push origin "$TAG"

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git cliff --latest --config cliff.toml > CHANGELOG_RELEASE.md

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum tildr-* > SHA256SUMS

      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Sign SHA256SUMS
        run: |
          cd dist
          echo "${{ secrets.GPG_PASSPHRASE }}" | \
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase-fd 0 \
              --detach-sign \
              --local-user "${{ secrets.GPG_KEY_ID }}" \
              SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.release_sha }}
          body_path: CHANGELOG_RELEASE.md
          files: |
            dist/tildr-${{ needs.prepare.outputs.version }}-linux-x86_64
            dist/tildr-${{ needs.prepare.outputs.version }}-macos-aarch64
            dist/tildr-${{ needs.prepare.outputs.version }}-macos-x86_64
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
